# Nginx reverse proxy configuration for TaskAgent Docker deployment
# 适配项目实际 API 路由结构

# Upstream configuration for Docker container
upstream taskagent_backend {
    # Docker Compose: use service name
    server taskagent:8080;
    # Standalone Docker: use host port
    # server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Redirect HTTP to HTTPS (uncomment if using SSL)
    # return 301 https://$host$request_uri;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
    gzip_comp_level 6;

    # ========================================
    # Health check (no prefix)
    # ========================================
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ========================================
    # SSE Stream endpoint - CRITICAL for real-time chat
    # Must disable all buffering for SSE to work properly
    # ========================================
    location ~ ^/api/chat/sessions/[^/]+/stream$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Disable buffering for SSE
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # Long timeout for SSE connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Disable nginx response buffering (for SSE)
        add_header X-Accel-Buffering "no" always;
    }

    # ========================================
    # Chat API routes
    # ========================================
    location /api/chat/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    # ========================================
    # Auth routes
    # ========================================
    location /api/auth/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================
    # Human approval routes (for agent callbacks)
    # ========================================
    location /human/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeout for waiting on approvals
        proxy_read_timeout 300s;
    }

    # ========================================
    # Admin routes (MCP admin, etc.)
    # ========================================
    location /api/admin/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================
    # General API routes
    # /api/agents/*, /api/users/*, /api/roles/*, /api/sessions/*,
    # /api/skills/*, /api/settings/*, /api/mcp/*
    # ========================================
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    # ========================================
    # Static assets - Vite build output
    # ========================================

    # Assets with content hash (immutable)
    location /assets/ {
        proxy_pass http://127.0.0.1:8080;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";

        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Icons
    location /icons/ {
        proxy_pass http://127.0.0.1:8080;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800";

        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Manifest
    location = /manifest.json {
        proxy_pass http://127.0.0.1:8080;
        expires 1d;
        access_log off;
        add_header Cache-Control "public, max-age=86400";

        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ========================================
    # SPA fallback - serve index.html for client routing
    # ========================================
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }
}

