# ========================================
# Upstream with Connection Pooling
# keepalive 复用连接，减少 TCP 握手开销
# ========================================
upstream backend {
    server 127.0.0.1:8000;
    keepalive 32;
    keepalive_timeout 60s;
}

# ========================================
# Gzip Compression
# ========================================
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 4;
gzip_min_length 256;
gzip_types
    application/json
    application/javascript
    application/x-javascript
    text/javascript
    text/css
    text/plain
    text/xml
    application/xml;

# ========================================
# Health check
# ========================================
location = /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
}

# ========================================
# SSE Stream - 实时聊天 (关键路径)
# 必须禁用所有缓冲
# ========================================
location ~ ^/api/chat/sessions/[^/]+/stream$ {
    proxy_pass http://backend;
    proxy_http_version 1.1;

    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';

    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    add_header X-Accel-Buffering "no" always;
}

# ========================================
# Chat API - 需要较长超时
# ========================================
location /api/chat/ {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_connect_timeout 3s;
    proxy_read_timeout 120s;
}

# ========================================
# Human approval (agent callbacks)
# ========================================
location /human/ {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_connect_timeout 3s;
    proxy_read_timeout 300s;
}

# ========================================
# Auth API
# ========================================
location /api/auth/ {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_connect_timeout 3s;
    proxy_read_timeout 30s;
}

# ========================================
# Upload API - 需要较大 body size
# ========================================
location /api/upload/ {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    client_max_body_size 100M;
    proxy_connect_timeout 10s;
    proxy_read_timeout 120s;
}

# ========================================
# General API (admin, agents, users, sessions, skills, mcp, etc.)
# ========================================
location /api/ {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_connect_timeout 3s;
    proxy_read_timeout 60s;
}

# ========================================
# Static Assets (immutable, 长缓存)
# ========================================
location /assets/ {
    proxy_pass http://backend;
    expires 1y;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
}

location /icons/ {
    proxy_pass http://backend;
    expires 7d;
    access_log off;
    add_header Cache-Control "public, max-age=604800";

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
}

location = /manifest.json {
    proxy_pass http://backend;
    expires 1d;
    access_log off;
    add_header Cache-Control "public, max-age=86400";

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
}

# ========================================
# SPA Fallback
# ========================================
location / {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_connect_timeout 3s;
    proxy_read_timeout 60s;
}
