<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- DNS Prefetch & Preconnect -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts - async load to avoid render blocking -->
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Canonical URL -->
    <link rel="canonical" href="https://lambchat.com/" />

    <!-- Basic Info -->
    <title>
      LambChat - AI Agent Platform | Multi-Model Chat & Skill Engine
    </title>
    <meta
      name="description"
      content="LambChat is a pluggable, multi-tenant AI conversation platform. Skills + MCP dual-engine driven, supporting Claude, GPT, Gemini and more. SSE streaming, multi-modal document processing, JWT/RBAC auth, and GitHub-synced Skills."
    />
    <meta
      name="keywords"
      content="AI chat, AI agent, AI assistant, LLM, MCP, Model Context Protocol, LangGraph, multi-model AI, pluggable AI, Skills engine, Claude, GPT, Gemini, SSE streaming, multi-tenant, JWT auth, RBAC, LambChat, AI conversation platform"
    />
    <meta name="author" content="LambChat" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta
      name="googlebot"
      content="index, follow, max-video-preview:-1, max-image-preview:large, max-snippet:-1"
    />

    <!-- Geo Tags -->
    <meta name="geo.region" content="US" />
    <meta name="geo.placename" content="Global" />
    <meta name="geo.position" content="0;0" />
    <meta name="ICBM" content="0, 0" />

    <!-- Language Alternates (hreflang) -->
    <link rel="alternate" hreflang="en" href="https://lambchat.com/?lng=en" />
    <link rel="alternate" hreflang="zh" href="https://lambchat.com/?lng=zh" />
    <link rel="alternate" hreflang="ja" href="https://lambchat.com/?lng=ja" />
    <link rel="alternate" hreflang="ko" href="https://lambchat.com/?lng=ko" />
    <link rel="alternate" hreflang="ru" href="https://lambchat.com/?lng=ru" />
    <link rel="alternate" hreflang="x-default" href="https://lambchat.com/" />

    <!-- Theme Color -->
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#1c1917"
      media="(prefers-color-scheme: dark)"
    />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/icons/icon-192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/icons/icon-512.png"
    />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="LambChat" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="LambChat - AI Agent Platform | Multi-Model Chat & Skill Engine"
    />
    <meta property="og:url" content="https://lambchat.com/" />
    <meta property="og:site_name" content="LambChat" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="zh_CN" />
    <meta property="og:locale:alternate" content="ja_JP" />
    <meta property="og:locale:alternate" content="ko_KR" />
    <meta property="og:locale:alternate" content="ru_RU" />
    <meta
      property="og:description"
      content="LambChat is a pluggable, multi-tenant AI conversation platform. Skills + MCP dual-engine driven, supporting Claude, GPT, Gemini and more. SSE streaming, multi-modal document processing, JWT/RBAC auth, and GitHub-synced Skills."
    />
    <meta
      property="og:image"
      content="https://lambchat.com/icons/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="LambChat - AI Agent Platform" />
    <meta property="og:site_type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lambchat" />
    <meta name="twitter:title" content="LambChat - AI Agent Platform" />
    <meta
      name="twitter:description"
      content="LambChat is a pluggable, multi-tenant AI conversation platform. Skills + MCP dual-engine driven, supporting Claude, GPT, Gemini and more."
    />
    <meta
      name="twitter:image"
      content="https://lambchat.com/icons/og-image.png"
    />
    <meta name="twitter:image:alt" content="LambChat - AI Agent Platform" />

    <!-- Security -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Preload critical assets -->
    <link
      rel="preload"
      href="/icons/icon.svg"
      as="image"
      type="image/svg+xml"
      fetchpriority="high"
    />

    <!-- JSON-LD: WebApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "LambChat",
        "url": "https://lambchat.com",
        "description": "A pluggable, multi-tenant AI conversation platform. Skills + MCP dual-engine driven, supporting Claude, GPT, Gemini and more.",
        "applicationCategory": "ChatApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "description": "Open source"
        },
        "browserRequirements": "Requires JavaScript",
        "softwareVersion": "1.0.0",
        "featureList": [
          "Multi-model AI chat (Claude, GPT, Gemini, etc.)",
          "Skills engine with GitHub sync",
          "Model Context Protocol (MCP) integration",
          "SSE real-time streaming",
          "Multi-modal document processing",
          "JWT/RBAC authentication",
          "Multi-tenant architecture"
        ],
        "screenshot": "https://lambchat.com/icons/og-image.png",
        "inLanguage": ["en", "zh", "ja", "ko", "ru"]
      }
    </script>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "LambChat",
        "url": "https://lambchat.com",
        "logo": "https://lambchat.com/icons/icon-512.png",
        "sameAs": []
      }
    </script>
  </head>

  <body>
    <!-- Inline critical CSS for flash-of-unstyled-content prevention -->
    <style>
      :root {
        --boot-theme-primary: #78716c;
        --boot-theme-border: #e7e5e4;
        --boot-theme-bg: #ffffff;
      }

      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      /* Prevent FOUC - show white/dark background immediately */
      body {
        background-color: var(--boot-theme-bg);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --boot-theme-primary: #a8a29e;
          --boot-theme-border: #44403c;
          --boot-theme-bg: #1c1917;
        }
      }

      /* Show loading indicator while JS loads */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        position: relative;
      }

      #root:empty::before,
      #root:empty::after {
        content: "";
        position: absolute;
        width: 32px;
        height: 32px;
        border-radius: 50%;
      }

      #root:empty::before {
        border: 2px solid var(--boot-theme-border);
      }

      #root:empty::after {
        border: 2px solid transparent;
        border-top-color: var(--boot-theme-primary);
        animation: lc-spin 0.6s linear infinite;
        will-change: transform;
      }

      @keyframes lc-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
